name: Daily Blog Crawl & Analysis

on:
  schedule:
    # Every day at 9:00 AM KST (0:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run crawler & build
        run: node scripts/run.js

      - name: Check for unanalyzed articles
        id: check
        run: |
          count=$(node -e "console.log(require('./data/articles.json').articles.filter(a=>!a.analyzed).length)")
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Unanalyzed: $count"

      - name: Analyze with Claude Code
        if: steps.check.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--permission-mode acceptEdits'
          prompt: |
            data/articles.json에서 analyzed:false인 모든 글을 분석해줘.
            각 글의 content 필드를 읽고, CLAUDE.md의 "분석 JSON 스키마"에 정의된
            형식대로 analysis 객체(summary, keyFeatures, howToUse, useCases, tags,
            difficulty, toolRecommendation)를 생성해서 해당 article에 넣어.
            그리고 analyzed:true와 analyzedAt(현재 ISO 타임스탬프)도 설정해.
            모든 글 처리가 끝나면 `npm run build`를 실행해 docs/index.html을 갱신해.
            모든 필드는 한국어로 작성하고, 새 파일을 만들지 말고 data/articles.json만
            수정해.

      - name: Rebuild site after analysis
        if: steps.check.outputs.count != '0'
        run: node scripts/build.js

      - name: Commit updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # claude-code-action이 checkout의 credential을 덮어쓰므로 재주입
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add data/articles.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: daily crawl update $(date -u +%Y-%m-%d)"
          git push
