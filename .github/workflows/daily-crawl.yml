name: Daily Blog Crawl & Analysis

on:
  schedule:
    # Every day at 9:00 AM KST (0:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run crawler & build
        run: node scripts/run.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: daily crawl update $(date -u +%Y-%m-%d)"
          git push
